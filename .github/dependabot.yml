version: 2
updates:
  # npm dependencies (root package). create-taqwright/ has no lockfile, so it is
  # not watched. Major bumps arrive as individual PRs; minor/patch are grouped
  # (dev vs prod) to avoid PR spam.
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      dev-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch
      production:
        dependency-type: production
        update-types:
          - minor
          - patch

  # Keep the GitHub Actions (checkout, setup-node, codeql-action, …) current.
  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns:
          - '*'
