name: Smoke (Android)

# Manual end-to-end smoke test: installs the PUBLISHED @taqwright/taqwright from
# npm, scaffolds a project, and runs the demo login spec against an EXISTING
# emulator booted by the android-emulator-runner action (taqwright just attaches
# to it). Manual-only so it never runs (or bills) unless explicitly triggered.
on:
  workflow_dispatch:

jobs:
  android-smoke:
    name: Run sample test on an existing emulator
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      # Brings in the committed e2e/ browser test + the repo lockfile (this
      # workflow otherwise builds entirely from the published npm package).
      - name: Checkout
        uses: actions/checkout@v6

      # Hardware acceleration for the emulator (ubuntu-latest runners expose KVM).
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      # Install the repo's deps (gives us @playwright/test to run the e2e config)
      # and the Chromium browser the codegen e2e drives.
      - name: Install repo deps + Playwright Chromium
        run: |
          npm ci
          npx playwright install --with-deps chromium

      # UiAutomator2 driver needs a JDK on PATH.
      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      # taqwright's appium.autoStart spawns `appium` from PATH — install it + the
      # Android driver up front so the run doesn't pay a cold `npx appium` fetch.
      - name: Install Appium + UiAutomator2 driver
        run: |
          npm install -g appium@^3
          appium driver install uiautomator2

      # Scaffold from the published package. --no-install skips the scaffold's
      # git+ssh devDependency (0.0.24); --demo-app downloads DemoApp-v1.0.0.apk
      # and writes the login example spec. No --with-avd: the action owns the AVD.
      - name: Scaffold a taqwright project
        run: |
          npx @taqwright/taqwright@latest init smoke \
            --platform android --demo-app \
            --no-install-toolchain --no-with-avd --no-install -y

      # Install the real package from npm (overwrites the git+ssh devDep line).
      - name: Install project dependencies from npm
        working-directory: smoke
        run: npm install --save-dev @taqwright/taqwright@latest typescript @types/node

      # Attach to the emulator the action boots (emulator-5554); autoStartDevice
      # false so taqwright does NOT try to create/boot one itself.
      - name: Point config at the existing emulator
        run: |
          cat > smoke/taqwright.config.ts <<'EOF'
          import { defineConfig, Platform } from '@taqwright/taqwright';

          export default defineConfig({
            testDir: './tests',
            // Per-test 58MB APK reinstall on the emulator exceeds the 30s default.
            timeout: 180000,
            projects: [
              {
                name: 'android',
                use: {
                  platform: Platform.ANDROID,
                  device: { provider: 'emulator', udid: 'emulator-5554' },
                  resetBetweenTests: true,
                  buildPath: './app/DemoApp-v1.0.0.apk',
                  appBundleId: 'com.taqelah.demo_app',
                  appium: {
                    autoStart: true,
                    autoStartDevice: false,
                    host: 'localhost',
                    port: 4723,
                  },
                },
              },
            ],
          });
          EOF

      # Creates the AVD, boots it with KVM, and runs `script` once it's online.
      - name: Boot emulator + run the sample test
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          profile: pixel_6
          force-avd-creation: true
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -no-boot-anim -camera-back none
          disable-animations: true
          # Everything must run inside this action's `script` — the emulator only
          # exists for its duration. First the codegen browser e2e, then the
          # existing mobile login spec.
          script: |
            set -e
            # Appium for the codegen e2e (the mobile npm test starts its own later).
            appium > /tmp/appium-codegen.log 2>&1 &
            APPIUM_PID=$!
            for i in $(seq 1 30); do curl -sf http://localhost:4723/status && break || sleep 2; done
            # Inspector server (no auto-open) on 4280, from the published package in smoke/.
            ( cd smoke && npx taqwright codegen --no-open --port 4280 ) > /tmp/codegen.log 2>&1 &
            CODEGEN_PID=$!
            for i in $(seq 1 30); do curl -sf http://localhost:4280 && break || sleep 2; done
            # Browser e2e against the inspector (config at the repo root).
            npx playwright test --config e2e/playwright.config.ts
            # Tear down before the mobile test (which starts its own Appium on 4723).
            kill $CODEGEN_PID || true
            kill $APPIUM_PID || true
            sleep 2
            # Existing mobile smoke test.
            cd smoke && npm test

      - name: Upload mobile report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: smoke/playwright-report/
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload codegen e2e artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: codegen-e2e
          path: |
            e2e/playwright-report/
            e2e/test-results/
            /tmp/codegen.log
            /tmp/appium-codegen.log
          if-no-files-found: ignore
          retention-days: 7
