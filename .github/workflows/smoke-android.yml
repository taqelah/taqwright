name: Smoke (Android)

# Manual end-to-end smoke test of the real user path: installs the PUBLISHED
# @taqwright/taqwright from npm, scaffolds a fresh project, then lets TAQWRIGHT
# itself provision the toolchain + create + boot the Android emulator and run the
# demo login spec. Manual-only so it never runs (or bills) unless triggered.
on:
  workflow_dispatch:

jobs:
  android-smoke:
    name: taqwright-provisioned emulator + sample test
    runs-on: ubuntu-latest
    # Heavy: `taqwright install --with-avd` pulls a managed JDK + Android SDK +
    # system image (~2 GB) and the emulator cold-boots inside the first test.
    timeout-minutes: 45

    steps:
      # Hardware acceleration for the emulator (ubuntu-latest runners expose KVM).
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      # taqwright provisions everything itself: --install-toolchain pulls a managed
      # JDK + Android SDK + Appium + uiautomator2 into ~/.cache/taqwright, --with-avd
      # creates AVD `taqwright_api34`, --demo-app downloads DemoApp-v1.0.0.apk and
      # writes the login spec. --no-install skips the scaffold's git+ssh npm step
      # (installed from npm below). No setup-java / global Appium / emulator action.
      - name: Scaffold + provision toolchain & AVD via taqwright
        run: |
          npx @taqwright/taqwright@latest init smoke \
            --platform android --demo-app \
            --install-toolchain --with-avd --no-install -y

      # Install the real package from npm (overwrites the git+ssh devDep line).
      - name: Install project dependencies from npm
        working-directory: smoke
        run: npm install --save-dev @taqwright/taqwright@latest typescript @types/node

      # Keep taqwright-managed boot (string device.name -> appium:avd, autoStartDevice),
      # but inject headless emulator flags (taqwright's own launcher isn't headless-
      # safe, so boot must go through Appium with -no-window via avdArgs) and a large
      # timeout since the first test cold-boots the AVD + installs uiautomator2 + APK.
      - name: Write CI config (headless avdArgs + timeout)
        run: |
          cat > smoke/taqwright.config.ts <<'EOF'
          import { defineConfig, Platform } from '@taqwright/taqwright';

          export default defineConfig({
            testDir: './tests',
            // First test cold-boots the AVD via Appium (boot + uiautomator2 install +
            // 58MB APK install), which blows past Playwright's 30s default.
            timeout: 300000,
            projects: [
              {
                name: 'android',
                use: {
                  platform: Platform.ANDROID,
                  // String name -> taqwright sets appium:avd so Appium boots this AVD.
                  device: { provider: 'emulator', name: 'taqwright_api34' },
                  resetBetweenTests: true,
                  buildPath: './app/DemoApp-v1.0.0.apk',
                  appBundleId: 'com.taqelah.demo_app',
                  appium: {
                    autoStart: true,
                    autoStartDevice: true,
                    host: 'localhost',
                    port: 4723,
                  },
                  capabilities: {
                    // Appium's UiAutomator2 driver launches the emulator with these.
                    'appium:avdArgs': '-no-window -no-audio -no-boot-anim -gpu swiftshader_indirect',
                  },
                },
              },
            ],
          });
          EOF

      # taqwright starts (managed) Appium, which boots taqwright_api34 headless and
      # runs the demo login specs.
      - name: Run the sample test
        working-directory: smoke
        run: npm test

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: smoke/playwright-report/
          if-no-files-found: ignore
          retention-days: 7
